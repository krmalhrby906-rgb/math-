<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Fun Game</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f99;
    color: #333;
    transition: background 0.5s;
}
.container {
    background: white;
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 360px;
    transition: transform 0.3s;
}
.container:hover { transform: scale(1.05); }
h1 { margin-bottom: 20px; }
.question { font-size: 28px; margin-bottom: 20px; }
input[type="number"] { padding: 10px; font-size: 18px; width: 100px; }
p { margin: 10px 0; }
</style>
</head>
<body>
<div class="container">
    <h1>Math Fun Game</h1>
    <p class="question" id="question">0 + 0 = ?</p>
    <input type="number" id="answer" placeholder="Your answer">
    <p>Score: <span id="score">0</span></p>
    <p>Time left: <span id="time">10</span>s</p>
</div>

<script>
let score = 0;
let time = 10;

// توليد سؤال جديد عشوائي
function generateQuestion() {
    let a = Math.floor(Math.random()*50);
    let b = Math.floor(Math.random()*50);
    document.getElementById("question").innerText = `${a} - ${b} = ?`;
    return a - b;
}

// بداية اللعبة
let correctAnswer = generateQuestion();

// التحقق من الإجابة عند كتابة المستخدم
document.getElementById("answer").addEventListener("input", function() {
    let userAnswer = parseInt(this.value);
    if(userAnswer === correctAnswer) {
        score++;
        document.getElementById("score").innerText = score;
        this.value = ""; // مسح الإجابة السابقة
        correctAnswer = generateQuestion(); // سؤال جديد
    }
});

// تشغيل عداد الوقت
let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;
    if(time <= 0) {
        clearInterval(timer);
        alert("Time's up! Your score: " + score);
        // إعادة اللعبة تلقائيًا
        score = 0;
        document.getElementById("score").innerText = score;
        time = 10;
        document.getElementById("time").innerText = time;
        correctAnswer = generateQuestion();
        timer = setInterval(arguments.callee, 1000);
    }
}, 1000);
</script>
</body>
</html>
